enabled: true # enable vmagent deployment

service:
  enabled: true
  type: ClusterIP
  port: "" # defaults to global.ports.vmagent when empty

httpRoute:
  enabled: false
  annotations: {}
  filters: []

replicaCount: 1 # vmagent replicas

remoteWriteUrl: "" # when empty, built from global protocol/ports/paths

scrapeInterval: 30s # global scrape interval
includeDefaultScrapeJobs: false # when true, include victoria-metrics, victoria-logs, victoria-traces, grafana, fluent-bit
# When true, add a scrape job for the separate sql-exporter Service (same namespace, global.ports.sql-exporter).
scrapeSqlExporter: false
scrapeTargets: [] # optional override; when empty, use global defaults
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

