{{- if and .Values.enabled .Values.rbac.create }}
{{- if and (not .Values.serviceAccount.create) (not .Values.serviceAccount.name) }}
{{- fail "sql-exporter: rbac.create requires serviceAccount.create or serviceAccount.name (dedicated SA for RoleBinding)" }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sql-exporter.fullname" . }}-secret-reader
  labels:
    {{- include "sql-exporter.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sql-exporter.fullname" . }}-secret-reader
  labels:
    {{- include "sql-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sql-exporter.fullname" . }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "sql-exporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
