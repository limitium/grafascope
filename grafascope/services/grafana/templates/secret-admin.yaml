{{- if not .Values.admin.existingSecret }}
{{- if or (not .Values.admin.user) (not .Values.admin.password) }}
{{- fail "Grafana admin credentials required: set grafana.admin.existingSecret (recommended) or both grafana.admin.user and grafana.admin.password" }}
{{- end }}
{{- end }}
{{- if and (not .Values.admin.existingSecret) .Values.admin.user .Values.admin.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grafana.fullname" . }}-admin
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.admin.user | quote }}
  admin-password: {{ .Values.admin.password | quote }}
{{- end -}}
