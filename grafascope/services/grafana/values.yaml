replicaCount: 1 # Grafana Deployment replicas

service:
  type: ClusterIP
  port: 3000

ingress:
  # Ingress is disabled by default in the service chart.
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

admin:
  # Required: set existingSecret (recommended) or both user and password.
  # existingSecret: secret with keys admin-user, admin-password
  existingSecret: ""
  user: ""
  password: ""

datasources:
  # Provision Victoria datasources.
  enabled: true
  # Optional overrides; when empty, URLs are derived from global paths.
  victoria-metrics-url: ""
  victoria-logs-url: ""
  victoria-traces-url: ""

dashboards:
  # Provision bundled dashboards.
  enabled: true

## Grafana persistence defaults live here; global values override size only.
## Keep mountPath fixed to the image requirement.
persistence:
  # Grafana storage for dashboards/plugins.
  enabled: true
  existingClaim: "" # use existing PVC name instead of creating one
  storageClassName: "" # leave empty to use default
  accessModes: ["ReadWriteOnce"]
  size: 10Gi
  mountPath: /var/lib/grafana

plugins: []
pluginsInstall: false # disable for offline images

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

server:
  # Minimal URL/domain: set rootUrl (and optionally domain, serveFromSubPath). Or set global.domain + global.paths.grafana to derive rootUrl.
  domain: ""
  rootUrl: ""
  serveFromSubPath: false
  cookieSameSite: "lax"
