service:
  type: ClusterIP
  port: 8428

httpRoute:
  enabled: false
  annotations: {}
  filters: []

persistence:
  enabled: true
  existingClaim: "" # use existing PVC name instead of creating one
  storageClassName: "" # leave empty to use default
  accessModes: ["ReadWriteOnce"]
  size: 10Gi
  mountPath: /vmdata

args:
  - "-storageDataPath=/vmdata"
  - "-httpListenAddr=:8428"
httpPathPrefix: ""
healthPath: ""
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
