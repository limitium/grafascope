service:
  type: ClusterIP
  port: 9410
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317

httpRoute:
  enabled: false
  annotations: {}
  filters: []
# HTTPRoute for OTLP gRPC (port 4317) at path /<namespace>/victoria-traces-grpc.
# Uses URLRewrite filter to strip the path prefix before forwarding to the backend,
# replicating the old nginx rewrite-target behavior.
httpRouteGrpc:
  enabled: false
  path: "" # default: global.paths.victoriaTracesGrpc
  annotations: {}
  filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /

persistence:
  enabled: true
  existingClaim: "" # use existing PVC name instead of creating one
  storageClassName: "" # leave empty to use default
  accessModes: ["ReadWriteOnce"]
  size: 10Gi
  mountPath: /vtraces

args:
  - "-storageDataPath=/vtraces"
  - "-httpListenAddr=:9410"
  - "-otlpGRPCListenAddr=:4317"
  - "-otlpGRPC.tls=false"
httpPathPrefix: ""
healthPath: ""
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
